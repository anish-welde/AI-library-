<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https:; connect-src https://www.googleapis.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AI Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Library View -->
    <div id="library-view">
      <header class="library-header">
        <h1>My Library</h1>
        <p class="subtitle">Leadership, AI &amp; Product Development</p>
      </header>

      <nav class="section-tabs" id="section-tabs">
        <button class="tab active" data-section="all">All</button>
        <button class="tab" data-section="leadership">Leadership</button>
        <button class="tab" data-section="ai-trends">AI &amp; Humanities</button>
        <button class="tab" data-section="product">Product Dev</button>
        <button class="tab" data-section="technical">AI Technical</button>
      </nav>

      <div class="book-grid" id="book-grid"></div>
    </div>

    <!-- Book Detail View -->
    <div id="book-view" class="hidden">
      <header class="book-header">
        <button class="back-btn" id="back-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          <span>Library</span>
        </button>
      </header>
      <div class="book-detail" id="book-detail"></div>
    </div>
  </div>

  <script src="books.js"></script>
  <script src="app.js"></script>
</body>
</html>
